<!DOCTYPE html>
<html lang="es-CO">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MV Inventario - Análisis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/unified-theme.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/overrides.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --mv-primary: #3b82f6; --mv-secondary: #2563eb; }
        * { transition: all 0.3s ease; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%); 
            font-family: 'Inter', sans-serif; 
            color: #f1f5f9; 
            min-height: 100vh; 
        }
        body.dark-mode { 
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%) !important; 
            color: #f1f5f9 !important; 
        }
        
        .navbar { 
            background: linear-gradient(135deg, rgba(0, 51, 102, 0.95) 0%, rgba(0, 77, 153, 0.95) 100%); 
            box-shadow: 0 8px 32px rgba(0, 51, 102, 0.4); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255,255,255,0.15); 
        }
        body.dark-mode .navbar { 
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.98) 0%, rgba(45, 45, 74, 0.98) 100%) !important; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; 
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(12px); 
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            color: #1e293b; 
        }
        body.dark-mode .card { 
            background: rgba(42, 42, 71, 0.98) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important; 
            color: #f1f5f9 !important; 
        }
        body.dark-mode .card p,
        body.dark-mode .card span,
        body.dark-mode .card div,
        body.dark-mode .card h3 { color: #f1f5f9 !important; }
        
        .toggle-dark { 
            background: linear-gradient(135deg, var(--mv-primary) 0%, var(--mv-secondary) 100%); 
            border: none; padding: 10px; border-radius: 50%; cursor: pointer; 
            color: white; font-size: 18px; width: 44px; height: 44px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5); 
            transition: all 0.3s ease;
        }
        .toggle-dark:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.7); }
        body.dark-mode .toggle-dark { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #1e293b !important; }
        
        h2.page-title { 
            color: #f8fafc; 
            font-size: 2rem; 
            font-weight: 700; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.3); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        
        h3.chart-title { 
            color: #1e293b; 
            font-size: 1.25rem; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 1.5rem;
        }
        body.dark-mode h3.chart-title { color: #f1f5f9 !important; }
        
        /* Metric Cards */
        .stat-card-custom { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 1.5rem 1.25rem; 
            border-radius: 14px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            color: #1e3a8a; 
            transition: all 0.3s ease;
        }
        .stat-card-custom:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25); }
        body.dark-mode .stat-card-custom { 
            background: rgba(42, 42, 71, 0.98) !important; 
            border-color: rgba(255, 255, 255, 0.1) !important; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important; 
            color: #93c5fd !important; 
        }
        body.dark-mode .stat-card-custom:hover { box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3) !important; }
        
        .stat-card-custom h5 { 
            font-size: 0.9rem; 
            color: #64748b; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        body.dark-mode .stat-card-custom h5 { color: #94a3b8 !important; }
        
        .stat-card-custom .stat-number { 
            font-size: 2.25rem; 
            font-weight: 800; 
            color: #1e3a8a; 
            line-height: 1.1; 
        }
        body.dark-mode .stat-card-custom .stat-number { color: #93c5fd !important; }
        
        .stat-card-custom i { 
            font-size: 2rem; 
            color: #3b82f6; 
            opacity: 0.9; 
        }
        body.dark-mode .stat-card-custom i { color: #818cf8 !important; }
        
        .stat-card-custom .stat-subtitle { 
            font-size: 0.8rem; 
            color: #94a3b8; 
            margin-top: 4px; 
        }
        
        /* List items */
        .list-item { 
            background: #fff; 
            padding: 14px 16px; 
            border-radius: 10px; 
            border: 1px solid #e5e7eb; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.25s ease;
        }
        .list-item:hover { 
            transform: translateX(4px); 
            border-color: #3b82f6; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15); 
        }
        body.dark-mode .list-item { 
            background: rgba(42, 42, 71, 0.98) !important; 
            border-color: #4b5563 !important; 
        }
        body.dark-mode .list-item:hover { border-color: #6366f1 !important; }
        
        body.dark-mode .list-item p { color: #f1f5f9 !important; }
        body.dark-mode .list-item span { color: #9ca3af !important; }
        
        /* Badge styles */
        .badge { padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .badge-success { background-color: #dcfce7; color: #166534; }
        .badge-warning { background-color: #fef3c7; color: #92400e; }
        .badge-danger { background-color: #fee2e2; color: #991b1b; }
        body.dark-mode .badge-success { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; }
        body.dark-mode .badge-warning { background-color: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        body.dark-mode .badge-danger { background-color: rgba(239, 68, 68, 0.2); color: #f87171; }
        
        /* Loading animation */
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .loading-pulse { animation: pulse-glow 1.5s infinite; }
    </style>
</head>

<body>
    <nav class="navbar p-4 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto flex justify-between items-center flex-wrap gap-4">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" style="background: transparent; border: 2px solid rgba(59, 130, 246, 0.8); color: #3b82f6; padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-weight: 500;">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
                <h1 class="text-2xl font-bold text-white">Análisis de Ventas</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="toggle-dark" title="Cambiar tema">
                    <i class="bi bi-moon" id="themeIcon"></i>
                </button>
                <div class="flex items-center gap-2 text-white" style="font-size: 1rem;">
                    <i class="bi bi-person-circle" style="font-size: 1.25rem;"></i>
                    <span class="font-medium" id="userName">Admin</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto p-6">
        <h2 class="page-title mb-8">
            <i class="bi bi-graph-up-arrow" style="font-size: 1.75rem;"></i>
            Análisis de Rendimiento
        </h2>

        <!-- Métricas -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <div class="stat-card-custom">
                <i class="bi bi-cash-coin"></i>
                <h5>Ganancia Neta</h5>
                <p class="stat-number" id="gananciaNeta">$0</p>
                <p class="stat-subtitle">Este mes</p>
            </div>
            <div class="stat-card-custom">
                <i class="bi bi-cart-check"></i>
                <h5>Ventas Totales</h5>
                <p class="stat-number" id="ventasTotales">$0</p>
                <p class="stat-subtitle"><span id="ventasUnidades">0</span> unidades</p>
            </div>
            <div class="stat-card-custom">
                <i class="bi bi-bag-plus"></i>
                <h5>Compras</h5>
                <p class="stat-number" id="comprasTotales">$0</p>
                <p class="stat-subtitle">Este mes</p>
            </div>
            <div class="stat-card-custom" style="padding: 1.25rem;">
                <i class="bi bi-heart-pulse" style="color: #8b5cf6; font-size: 1.5rem;"></i>
                <h5 style="font-size: 0.8rem;">Salud Inventario</h5>
                <div style="height: 100px; width: 100px; margin-top: 8px;">
                    <canvas id="healthChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Gráficas -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="card p-6">
                <h3 class="chart-title">
                    <i class="bi bi-bar-chart-fill" style="font-size: 1.4rem; color: #3b82f6;"></i> 
                    Productos Más Vendidos
                </h3>
                <div style="height: 300px; animation: fadeIn 0.8s ease-out;">
                    <canvas id="topProductsChart"></canvas>
                </div>
            </div>
            <div class="card p-6">
                <h3 class="chart-title">
                    <i class="bi bi-graph-up" style="font-size: 1.4rem; color: #10b981;"></i> 
                    Ganancias por Mes
                </h3>
                <div style="height: 300px; animation: fadeIn 0.8s ease-out 0.2s both;">
                    <canvas id="gananciasChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Listas -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card p-6">
                <h3 class="chart-title">
                    <i class="bi bi-exclamation-triangle-fill" style="font-size: 1.4rem; color: #f59e0b;"></i> 
                    Productos con Bajo Stock
                </h3>
                <div id="bajoStockList" class="space-y-3">
                    <p class="text-gray-500 text-center py-6 loading-pulse">Cargando datos...</p>
                </div>
            </div>
            <div class="card p-6">
                <h3 class="chart-title">
                    <i class="bi bi-trophy-fill" style="font-size: 1.4rem; color: #eab308;"></i> 
                    Mayor Margen de Ganancia
                </h3>
                <div id="mayorMargenList" class="space-y-3">
                    <p class="text-gray-500 text-center py-6 loading-pulse">Cargando datos...</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .loading-pulse { animation: pulse-glow 1.5s infinite; }
    </style>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('themeIcon').className = isDark ? 'bi bi-sun' : 'bi bi-moon';
            if (typeof refreshAnalyticsCharts === 'function') refreshAnalyticsCharts();
        }
        document.addEventListener('DOMContentLoaded', function () {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').className = 'bi bi-sun';
            }
        });
    </script>
    <script src="../scripts/analytics.js"></script>
</body>
</html>
